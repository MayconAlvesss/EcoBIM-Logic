[lint]
select = ["E", "W", "F"]
ignore = [
    "E501",   # line too long
    "E701",   # multiple statements on one line
    "E402",   # module level import not at top
    "E722",   # bare except
    "E741",   # ambiguous variable name
    "W291",   # trailing whitespace
    "W293",   # blank line contains whitespace
    "F401",   # unused imports
]

[lint.per-file-ignores]
"lab/*" = ["F841"]
"tests/*" = ["E402", "F841"]
"web/*" = ["E402"]
"api/*" = ["E402"]
